<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechLearn — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div id="toast-container"></div>

<div class="auth-page">
  <div class="auth-card" id="auth-card">

    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">Tech<span>Learn</span></div>
    </div>

    <div class="badge" style="margin-top:14px">ACCESO SEGURO</div>

    <h1>Bienvenido de vuelta</h1>
    <p class="subtitle">Inicia sesión para continuar aprendiendo</p>
    <div class="divider"></div>

    <div class="user-hint" id="user-hint">
      🧑‍💻 <span id="user-count-msg">Cargando...</span>
    </div>

    <div class="field">
      <label>Correo electrónico</label>
      <div class="input-wrap">
        <span class="icon">📧</span>
        <input type="email" id="correo" placeholder="dev@ejemplo.com" autocomplete="off"/>
      </div>
      <div class="field-error" id="err-correo">Ingresa un correo válido</div>
    </div>

    <div class="field">
      <label>Contraseña</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="Tu contraseña"/>
        <button class="toggle-pw" id="toggle-btn" type="button">👁️</button>
      </div>
      <div class="field-error" id="err-password">Contraseña incorrecta</div>
    </div>

    <button class="btn-primary" id="login-btn">🚀 Iniciar sesión</button>

    <div class="footer-link">
      ¿No tienes cuenta? <a href="register.html">Regístrate gratis →</a>
    </div>

  </div>
</div>

<script src="js/login.js"></script>
</body>
</html>

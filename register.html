<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechLearn — Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div id="toast-container"></div>

<div class="auth-page">
  <div class="auth-card" id="auth-card">

    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">Tech<span>Learn</span></div>
    </div>

    <div class="badge" style="margin-top:14px">SECURE REGISTRATION</div>

    <h1>Crea tu cuenta</h1>
    <p class="subtitle">Únete a miles de devs que ya están aprendiendo</p>
    <div class="divider"></div>

    <div class="form-row">
      <div class="field">
        <label>Nombre</label>
        <div class="input-wrap">
          <span class="icon">👤</span>
          <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="off"/>
        </div>
        <div class="field-error" id="err-nombre">Ingresa tu nombre</div>
      </div>
      <div class="field">
        <label>Edad</label>
        <div class="input-wrap">
          <span class="icon">🎂</span>
          <input type="number" id="edad" placeholder="18" min="1" max="120"/>
        </div>
        <div class="field-error" id="err-edad">Edad inválida (1–120)</div>
      </div>
    </div>

    <div class="field">
      <label>Correo electrónico</label>
      <div class="input-wrap">
        <span class="icon">📧</span>
        <input type="email" id="correo" placeholder="dev@ejemplo.com" autocomplete="off"/>
      </div>
      <div class="field-error" id="err-correo">Correo inválido</div>
    </div>

    <div class="field">
      <label>Contraseña</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
      </div>
      <div class="strength-bar">
        <div class="strength-seg" id="s1"></div>
        <div class="strength-seg" id="s2"></div>
        <div class="strength-seg" id="s3"></div>
        <div class="strength-seg" id="s4"></div>
      </div>
      <div class="strength-label" id="strength-label"></div>
      <div class="field-error" id="err-password">Mínimo 6 caracteres</div>
    </div>

    <button class="btn-primary" id="register-btn">⚡ Crear cuenta</button>

    <div class="footer-link">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión →</a>
    </div>

  </div>
</div>

<script src="js/register.js"></script>
</body>
</html>

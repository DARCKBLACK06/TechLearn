<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechLearn — Tienda</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080c10;
      --bg2:     #0d1117;
      --card:    #111720;
      --card2:   #151d28;
      --border:  #1e2d3d;
      --cyan:    #00d4ff;
      --cyan2:   #0096b4;
      --blue:    #0056a3;
      --text:    #cdd9e5;
      --muted:   #556070;
      --error:   #ff4d6d;
      --success: #00e5a0;
      --warn:    #ff9f1c;
    }

    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; overflow-x: hidden; }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
    .orb-1 { width: 600px; height: 600px; top: -200px; left: -200px; background: rgba(0,150,180,.12); }
    .orb-2 { width: 500px; height: 500px; bottom: -150px; right: -150px; background: rgba(0,86,163,.14); }

    /* ══ NAVBAR ══ */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,12,16,.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .nav-logo-text { font-family: 'Share Tech Mono', monospace; font-size: 18px; color: var(--cyan); }
    .nav-logo-text span { color: var(--text); }

    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-user { font-size: 13px; color: var(--muted); }
    .nav-user strong { color: var(--cyan); }

    .cart-btn {
      position: relative; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 16px;
      color: var(--text); font-family: 'Exo 2', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: border-color .2s, box-shadow .2s;
    }
    .cart-btn:hover { border-color: var(--cyan); box-shadow: 0 0 12px rgba(0,212,255,.15); }
    .cart-count {
      background: var(--cyan); color: #000;
      font-size: 11px; font-weight: 900;
      min-width: 18px; height: 18px;
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
      transition: transform .2s;
    }
    .cart-count.bump { animation: bump .25s ease; }
    @keyframes bump { 0%,100% { transform:scale(1); } 50% { transform:scale(1.5); } }

    .logout-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-family: 'Exo 2', sans-serif; font-size: 12px;
      padding: 7px 12px; cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .logout-btn:hover { border-color: var(--error); color: var(--error); }

    /* ══ LAYOUT ══ */
    .main { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 36px 24px 80px; }

    /* ══ HERO ══ */
    .hero { margin-bottom: 40px; }
    .hero h1 { font-size: clamp(24px,4vw,38px); font-weight: 900; line-height: 1.15; }
    .hero h1 span { color: var(--cyan); }
    .hero p { color: var(--muted); font-size: 14px; margin-top: 8px; }

    /* ══ GRID ══ */
    .section-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px; letter-spacing: 2px; color: var(--muted);
      text-transform: uppercase; margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }

    /* ══ COURSE CARD ══ */
    .course-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      position: relative;
    }
    .course-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,.4), 0 0 20px rgba(0,212,255,.07);
      border-color: rgba(0,212,255,.25);
    }

    .course-banner {
      height: 110px; display: flex; align-items: center; justify-content: center;
      font-size: 48px; position: relative; overflow: hidden;
    }
    .course-banner::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 40%, var(--card));
    }

    .course-body { padding: 16px; }
    .course-tag {
      font-size: 10px; font-family: 'Share Tech Mono', monospace;
      color: var(--cyan2); background: rgba(0,212,255,.08);
      border: 1px solid rgba(0,212,255,.15);
      border-radius: 4px; padding: 2px 7px;
      display: inline-block; margin-bottom: 8px;
      letter-spacing: .8px;
    }
    .course-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
    .course-desc { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }

    .course-footer { display: flex; align-items: center; justify-content: space-between; }
    .course-price { font-size: 20px; font-weight: 900; color: var(--cyan); }
    .course-price span { font-size: 12px; font-weight: 400; color: var(--muted); }

    .add-btn {
      background: linear-gradient(135deg, var(--cyan2), var(--blue));
      border: none; border-radius: 8px;
      color: #fff; font-family: 'Exo 2', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: .5px;
      padding: 8px 14px; cursor: pointer;
      transition: opacity .2s, box-shadow .2s, transform .1s;
    }
    .add-btn:hover { opacity: .9; box-shadow: 0 0 14px rgba(0,212,255,.3); }
    .add-btn:active { transform: scale(.95); }
    .add-btn.added {
      background: linear-gradient(135deg, #00e5a0, #00876a);
    }

    /* ══ CART PANEL ══ */
    .cart-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
    }
    .cart-overlay.open { opacity: 1; pointer-events: all; }

    .cart-panel {
      position: fixed; top: 0; right: 0; bottom: 0; z-index: 201;
      width: 100%; max-width: 420px;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(.4,0,.2,1);
      box-shadow: -20px 0 60px rgba(0,0,0,.5);
    }
    .cart-panel.open { transform: translateX(0); }

    .cart-header {
      padding: 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .cart-header h2 { font-size: 18px; font-weight: 800; }
    .cart-close {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; width: 34px; height: 34px;
      color: var(--muted); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color .2s, border-color .2s;
    }
    .cart-close:hover { color: var(--error); border-color: var(--error); }

    .cart-items { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .cart-items::-webkit-scrollbar { width: 4px; }
    .cart-items::-webkit-scrollbar-track { background: transparent; }
    .cart-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .cart-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%;
      gap: 12px; color: var(--muted); text-align: center;
    }
    .cart-empty .empty-icon { font-size: 52px; opacity: .4; }
    .cart-empty p { font-size: 14px; line-height: 1.5; }

    .cart-item {
      display: flex; align-items: center; gap: 14px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px;
      margin-bottom: 12px;
      animation: fadeUp .25s ease both;
    }
    .cart-item-icon { font-size: 28px; flex-shrink: 0; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item-price { font-size: 12px; color: var(--cyan); font-weight: 600; margin-top: 2px; }

    .cart-item-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .qty-btn {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 6px; width: 26px; height: 26px;
      color: var(--text); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, color .2s;
    }
    .qty-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .qty-num { font-size: 13px; font-weight: 700; min-width: 16px; text-align: center; }
    .remove-btn {
      background: none; border: none;
      color: var(--muted); font-size: 16px; cursor: pointer;
      transition: color .2s;
    }
    .remove-btn:hover { color: var(--error); }

    .cart-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
    }
    .cart-summary { margin-bottom: 16px; }
    .summary-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; color: var(--muted); margin-bottom: 8px;
    }
    .summary-row.total {
      font-size: 20px; font-weight: 900; color: var(--text);
      border-top: 1px solid var(--border); padding-top: 12px; margin-top: 8px;
    }
    .summary-row.total span:last-child { color: var(--cyan); }

    .checkout-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--cyan2), var(--blue));
      border: none; border-radius: 10px; color: #fff;
      font-family: 'Exo 2', sans-serif; font-size: 15px; font-weight: 800;
      letter-spacing: .8px; text-transform: uppercase;
      cursor: pointer; transition: opacity .2s, box-shadow .2s;
      margin-bottom: 10px;
    }
    .checkout-btn:hover { opacity: .9; box-shadow: 0 0 24px rgba(0,212,255,.3); }

    .clear-btn {
      width: 100%; padding: 10px;
      background: none; border: 1px solid var(--border);
      border-radius: 10px; color: var(--muted);
      font-family: 'Exo 2', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: border-color .2s, color .2s;
    }
    .clear-btn:hover { border-color: var(--error); color: var(--error); }

    /* ══ TOAST ══ */
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast {
      display: flex; align-items: center; gap: 12px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 18px;
      min-width: 260px; max-width: 360px;
      box-shadow: 0 8px 30px rgba(0,0,0,.5);
      animation: slideIn .3s ease both; font-size: 14px;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--error); }
    .toast.warn    { border-left: 3px solid var(--warn); }
    .toast-icon { font-size: 18px; flex-shrink: 0; }
    .toast-msg { flex: 1; line-height: 1.4; }
    .toast-close { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; }
    @keyframes slideIn  { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slideOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(40px); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 600px) {
      nav { padding: 0 16px; }
      .main { padding: 24px 16px 60px; }
      .cart-panel { max-width: 100%; }
      .nav-user { display: none; }
    }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div id="toast-container"></div>

<!-- Cart overlay -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>

<!-- Cart panel -->
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <h2>🛒 Mi Carrito</h2>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer" id="cart-footer" style="display:none">
    <div class="cart-summary">
      <div class="summary-row"><span>Cursos</span><span id="cart-qty">0</span></div>
      <div class="summary-row"><span>Descuento</span><span style="color:var(--success)">$0.00</span></div>
      <div class="summary-row total"><span>Total</span><span id="cart-total">$0.00</span></div>
    </div>
    <button class="checkout-btn" onclick="checkout()">💳 Comprar ahora</button>
    <button class="clear-btn" onclick="clearCart()">🗑️ Vaciar carrito</button>
  </div>
</div>

<!-- Navbar -->
<nav>
  <div class="nav-logo">
    <div class="nav-logo-icon">⚡</div>
    <div class="nav-logo-text">Tech<span>Learn</span></div>
  </div>
  <div class="nav-right">
    <div class="nav-user">Hola, <strong id="user-name">...</strong></div>
    <button class="cart-btn" onclick="openCart()">
      🛒 Carrito
      <div class="cart-count" id="cart-count">0</div>
    </button>
    <button class="logout-btn" onclick="logout()">Salir →</button>
  </div>
</nav>

<!-- Main -->
<div class="main">
  <div class="hero">
    <h1>Cursos de <span>Tecnología</span><br/>al siguiente nivel</h1>
    <p>12 cursos premium · Aprende a tu ritmo · Acceso de por vida</p>
  </div>

  <div class="section-title">// Catálogo de cursos</div>

  <div class="courses-grid" id="courses-grid"></div>
</div>

<script>
  // ══ AUTH GUARD ══
  const session = JSON.parse(localStorage.getItem('tl_session') || 'null');
  if (!session) { window.location.href = 'login.html'; }
  else { document.getElementById('user-name').textContent = session.nombre; }

  // ══ DATA ══
  const courses = [
    { id:1,  name:'Python desde Cero',      tag:'BACKEND',    icon:'🐍', price:499, desc:'Variables, funciones, POO y proyectos reales con Python 3.' },
    { id:2,  name:'JavaScript Moderno',     tag:'FRONTEND',   icon:'⚡', price:549, desc:'ES6+, promesas, async/await y el DOM al máximo.' },
    { id:3,  name:'React + Hooks',          tag:'FRONTEND',   icon:'⚛️', price:649, desc:'Componentes, estado, Context API y proyectos completos.' },
    { id:4,  name:'Node.js & Express',      tag:'BACKEND',    icon:'🟢', price:599, desc:'APIs REST, middleware, autenticación y bases de datos.' },
    { id:5,  name:'Docker & Containers',    tag:'DEVOPS',     icon:'🐳', price:579, desc:'Imágenes, volúmenes, redes y Docker Compose.' },
    { id:6,  name:'Git & GitHub Pro',       tag:'HERRAMIENTAS',icon:'🔀', price:299, desc:'Ramas, merges, pull requests y workflows profesionales.' },
    { id:7,  name:'SQL & Bases de Datos',   tag:'DATABASE',   icon:'🗄️', price:499, desc:'Consultas, joins, índices y optimización de queries.' },
    { id:8,  name:'Ciberseguridad Básica',  tag:'SECURITY',   icon:'🔐', price:699, desc:'Ethical hacking, vulnerabilidades y protocolos seguros.' },
    { id:9,  name:'Linux para Devs',        tag:'SISTEMAS',   icon:'🐧', price:399, desc:'Terminal, permisos, scripting y administración de servidores.' },
    { id:10, name:'TypeScript Avanzado',    tag:'FRONTEND',   icon:'🔷', price:549, desc:'Tipos, generics, decorators y proyectos escalables.' },
    { id:11, name:'Flutter & Dart',         tag:'MOBILE',     icon:'📱', price:649, desc:'Apps nativas iOS y Android desde un solo código base.' },
    { id:12, name:'Machine Learning',       tag:'IA',         icon:'🤖', price:799, desc:'Regresión, clasificación, redes neuronales y scikit-learn.' },
  ];

  const bannerColors = {
    BACKEND:'linear-gradient(135deg,#0a2340,#0d3b6e)',
    FRONTEND:'linear-gradient(135deg,#0d2b1a,#0d4a2a)',
    DEVOPS:'linear-gradient(135deg,#1a1a0d,#3a3a00)',
    HERRAMIENTAS:'linear-gradient(135deg,#1a0a2e,#2e0d5c)',
    DATABASE:'linear-gradient(135deg,#0d1a2e,#0d2e4a)',
    SECURITY:'linear-gradient(135deg,#2e0a0a,#5c1a1a)',
    SISTEMAS:'linear-gradient(135deg,#0a1a0a,#1a3a1a)',
    MOBILE:'linear-gradient(135deg,#1a0d2e,#2e1a5c)',
    IA:'linear-gradient(135deg,#0d1a2e,#1a3a5c)',
  };

  // ══ CART STATE ══
  let cart = JSON.parse(localStorage.getItem('tl_cart') || '[]');

  function saveCart() { localStorage.setItem('tl_cart', JSON.stringify(cart)); }

  // ══ RENDER COURSES ══
  function renderCourses() {
    const grid = document.getElementById('courses-grid');
    grid.innerHTML = courses.map(c => {
      const inCart = cart.find(i => i.id === c.id);
      return `
        <div class="course-card">
          <div class="course-banner" style="background:${bannerColors[c.tag]||'var(--card2)'}">
            ${c.icon}
          </div>
          <div class="course-body">
            <div class="course-tag">${c.tag}</div>
            <div class="course-name">${c.name}</div>
            <div class="course-desc">${c.desc}</div>
            <div class="course-footer">
              <div class="course-price">$${c.price} <span>MXN</span></div>
              <button class="add-btn ${inCart?'added':''}" onclick="addToCart(${c.id})" id="add-btn-${c.id}">
                ${inCart ? '✓ Agregado' : '+ Agregar'}
              </button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  // ══ CART LOGIC ══
  function addToCart(id) {
    const course = courses.find(c => c.id === id);
    const existing = cart.find(i => i.id === id);

    if (existing) {
      existing.qty++;
      showToast(`+1 "${course.name}" en el carrito`, 'warn');
    } else {
      cart.push({ ...course, qty: 1 });
      showToast(`"${course.name}" agregado 🎉`, 'success');
      const btn = document.getElementById(`add-btn-${id}`);
      if (btn) { btn.classList.add('added'); btn.textContent = '✓ Agregado'; }
    }

    saveCart();
    updateCartUI();
    bumpCount();
  }

  function removeFromCart(id) {
    cart = cart.filter(i => i.id !== id);
    saveCart();
    updateCartUI();
    renderCartPanel();
  }

  function changeQty(id, delta) {
    const item = cart.find(i => i.id === id);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) { removeFromCart(id); return; }
    saveCart();
    updateCartUI();
    renderCartPanel();
  }

  function clearCart() {
    if (cart.length === 0) { showToast('El carrito ya está vacío', 'warn'); return; }
    cart = [];
    saveCart();
    updateCartUI();
    renderCartPanel();
    renderCourses();
    showToast('Carrito vaciado', 'warn');
  }

  function checkout() {
    if (cart.length === 0) return;
    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
    showToast(`¡Compra de $${total.toLocaleString()} MXN procesada! 🎉`, 'success');
    cart = [];
    saveCart();
    updateCartUI();
    renderCartPanel();
    renderCourses();
    closeCart();
  }

  // ══ UI UPDATES ══
  function updateCartUI() {
    const totalItems = cart.reduce((s, i) => s + i.qty, 0);
    document.getElementById('cart-count').textContent = totalItems;
    document.getElementById('cart-qty').textContent = totalItems;
    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
    document.getElementById('cart-total').textContent = `$${total.toLocaleString()} MXN`;
    document.getElementById('cart-footer').style.display = cart.length ? 'block' : 'none';
  }

  function renderCartPanel() {
    const container = document.getElementById('cart-items');
    if (cart.length === 0) {
      container.innerHTML = `
        <div class="cart-empty">
          <div class="empty-icon">🛒</div>
          <p>Tu carrito está vacío.<br/>¡Agrega algunos cursos!</p>
        </div>
      `;
      return;
    }
    container.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="cart-item-icon">${item.icon}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">$${(item.price * item.qty).toLocaleString()} MXN</div>
        </div>
        <div class="cart-item-controls">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
          <button class="remove-btn" onclick="removeFromCart(${item.id})">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  function bumpCount() {
    const el = document.getElementById('cart-count');
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }

  // ══ PANEL OPEN/CLOSE ══
  function openCart() {
    renderCartPanel();
    document.getElementById('cart-panel').classList.add('open');
    document.getElementById('cart-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeCart() {
    document.getElementById('cart-panel').classList.remove('open');
    document.getElementById('cart-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ══ LOGOUT ══
  function logout() {
    localStorage.removeItem('tl_session');
    showToast('Sesión cerrada. ¡Hasta pronto! 👋', 'warn');
    setTimeout(() => { window.location.href = 'login.html'; }, 1500);
  }

  // ══ TOAST ══
  function showToast(msg, type = 'success') {
    const container = document.getElementById('toast-container');
    const icons = { success:'✅', error:'❌', warn:'⚠️' };
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `
      <span class="toast-icon">${icons[type]}</span>
      <span class="toast-msg">${msg}</span>
      <button class="toast-close" onclick="removeToast(this.parentElement)">✕</button>
    `;
    container.appendChild(t);
    setTimeout(() => removeToast(t), 3500);
  }
  function removeToast(el) {
    if (!el || !el.parentElement) return;
    el.style.animation = 'slideOut .3s ease forwards';
    setTimeout(() => el.remove(), 300);
  }

  // ══ INIT ══
  renderCourses();
  updateCartUI();
</script>
</body>
</html>

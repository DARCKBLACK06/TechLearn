<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechLearn — Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c10;
      --bg2:       #0d1117;
      --card:      #111720;
      --border:    #1e2d3d;
      --cyan:      #00d4ff;
      --cyan2:     #0096b4;
      --blue:      #0056a3;
      --text:      #cdd9e5;
      --muted:     #556070;
      --error:     #ff4d6d;
      --success:   #00e5a0;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      overflow-x: hidden;
    }

    /* ── Grid background ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,212,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── Glow orbs ── */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: 0;
    }
    .orb-1 { width: 500px; height: 500px; top: -150px; left: -150px; background: rgba(0,150,180,.18); }
    .orb-2 { width: 400px; height: 400px; bottom: -100px; right: -100px; background: rgba(0,86,163,.20); }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 44px 40px;
      box-shadow: 0 0 60px rgba(0,212,255,.06), 0 24px 60px rgba(0,0,0,.5);
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Logo / Header ── */
    .logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 20px;
      color: var(--cyan);
      letter-spacing: 1px;
    }
    .logo-text span { color: var(--text); }

    h1 {
      font-size: 26px; font-weight: 900;
      margin: 20px 0 4px;
      line-height: 1.2;
    }
    .subtitle {
      font-size: 13px; color: var(--muted);
      margin-bottom: 32px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 28px;
    }

    /* ── Form ── */
    .form-row { display: flex; gap: 14px; }
    .form-row .field { flex: 1; }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 11px; font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }
    .input-wrap .icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px; opacity: .5;
      pointer-events: none;
    }

    input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
      padding: 11px 14px 11px 40px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,212,255,.12);
    }
    input::placeholder { color: var(--muted); font-size: 13px; }
    input.error-input { border-color: var(--error); }

    .field-error {
      font-size: 11px; color: var(--error);
      margin-top: 5px; display: none;
    }

    /* strength bar */
    .strength-bar {
      display: flex; gap: 4px; margin-top: 7px;
    }
    .strength-seg {
      flex: 1; height: 3px; border-radius: 2px;
      background: var(--border);
      transition: background .3s;
    }
    .strength-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Button ── */
    .btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--cyan2), var(--blue));
      border: none; border-radius: 8px;
      color: #fff;
      font-family: 'Exo 2', sans-serif;
      font-size: 14px; font-weight: 700;
      letter-spacing: .8px; text-transform: uppercase;
      cursor: pointer;
      transition: opacity .2s, transform .1s, box-shadow .2s;
      margin-top: 6px;
      position: relative; overflow: hidden;
    }
    .btn:hover { opacity: .9; box-shadow: 0 0 20px rgba(0,212,255,.3); }
    .btn:active { transform: scale(.98); }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
      transform: translateX(-100%);
      transition: transform .5s;
    }
    .btn:hover::after { transform: translateX(100%); }

    /* ── Footer ── */
    .footer-link {
      text-align: center; margin-top: 22px;
      font-size: 13px; color: var(--muted);
    }
    .footer-link a {
      color: var(--cyan); text-decoration: none; font-weight: 600;
    }
    .footer-link a:hover { text-decoration: underline; }

    /* ── Toast ── */
    #toast-container {
      position: fixed; bottom: 24px; right: 24px;
      z-index: 9999;
      display: flex; flex-direction: column; gap: 10px;
    }
    .toast {
      display: flex; align-items: center; gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      min-width: 280px; max-width: 360px;
      box-shadow: 0 8px 30px rgba(0,0,0,.5);
      animation: slideIn .3s ease both;
      font-size: 14px;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--error); }
    .toast-icon { font-size: 18px; flex-shrink: 0; }
    .toast-msg { flex: 1; line-height: 1.4; }
    .toast-close {
      background: none; border: none; color: var(--muted);
      font-size: 16px; cursor: pointer; padding: 0 2px;
    }
    @keyframes slideIn {
      from { opacity:0; transform: translateX(40px); }
      to   { opacity:1; transform: translateX(0); }
    }
    @keyframes slideOut {
      from { opacity:1; transform: translateX(0); }
      to   { opacity:0; transform: translateX(40px); }
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-family: 'Share Tech Mono', monospace;
      color: var(--cyan2); background: rgba(0,212,255,.07);
      border: 1px solid rgba(0,212,255,.15);
      border-radius: 4px; padding: 3px 8px;
      margin-bottom: 14px;
    }
    .badge::before { content: '●'; font-size: 7px; color: var(--success); }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div id="toast-container"></div>

<div class="page">
  <div class="card">

    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">Tech<span>Learn</span></div>
    </div>

    <div class="badge">SECURE REGISTRATION</div>

    <h1>Crea tu cuenta</h1>
    <p class="subtitle">Únete a miles de devs que ya están aprendiendo</p>
    <div class="divider"></div>

    <div class="form-row">
      <div class="field">
        <label>Nombre</label>
        <div class="input-wrap">
          <span class="icon">👤</span>
          <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="off"/>
        </div>
        <div class="field-error" id="err-nombre">Ingresa tu nombre</div>
      </div>
      <div class="field">
        <label>Edad</label>
        <div class="input-wrap">
          <span class="icon">🎂</span>
          <input type="number" id="edad" placeholder="18" min="1" max="120"/>
        </div>
        <div class="field-error" id="err-edad">Edad inválida (1–120)</div>
      </div>
    </div>

    <div class="field">
      <label>Correo electrónico</label>
      <div class="input-wrap">
        <span class="icon">📧</span>
        <input type="email" id="correo" placeholder="dev@ejemplo.com" autocomplete="off"/>
      </div>
      <div class="field-error" id="err-correo">Correo inválido</div>
    </div>

    <div class="field">
      <label>Contraseña</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
      </div>
      <div class="strength-bar">
        <div class="strength-seg" id="s1"></div>
        <div class="strength-seg" id="s2"></div>
        <div class="strength-seg" id="s3"></div>
        <div class="strength-seg" id="s4"></div>
      </div>
      <div class="strength-label" id="strength-label"></div>
      <div class="field-error" id="err-password">Mínimo 6 caracteres</div>
    </div>

    <button class="btn" onclick="registrar()">⚡ Crear cuenta</button>

    <div class="footer-link">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión →</a>
    </div>

  </div>
</div>

<script>
  // ── Toast ──
  function showToast(msg, type = 'success') {
    const container = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `
      <span class="toast-icon">${type === 'success' ? '✅' : '❌'}</span>
      <span class="toast-msg">${msg}</span>
      <button class="toast-close" onclick="removeToast(this.parentElement)">✕</button>
    `;
    container.appendChild(t);
    setTimeout(() => removeToast(t), 4000);
  }

  function removeToast(el) {
    if (!el || !el.parentElement) return;
    el.style.animation = 'slideOut .3s ease forwards';
    setTimeout(() => el.remove(), 300);
  }

  // ── Password strength ──
  const pwdInput = document.getElementById('password');
  const colors = ['#ff4d6d','#ff9f1c','#00b4d8','#00e5a0'];
  const labels = ['Muy débil','Regular','Buena','Fuerte 🔥'];

  pwdInput.addEventListener('input', () => {
    const v = pwdInput.value;
    let score = 0;
    if (v.length >= 6)  score++;
    if (v.length >= 10) score++;
    if (/[A-Z]/.test(v) && /[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;

    for (let i = 1; i <= 4; i++) {
      const seg = document.getElementById(`s${i}`);
      seg.style.background = i <= score ? colors[score-1] : 'var(--border)';
    }
    document.getElementById('strength-label').textContent = v.length ? labels[score-1] || '' : '';
    document.getElementById('strength-label').style.color = v.length ? colors[score-1] : '';
  });

  // ── Validation ──
  function clearErrors() {
    document.querySelectorAll('.field-error').forEach(e => e.style.display = 'none');
    document.querySelectorAll('input').forEach(i => i.classList.remove('error-input'));
  }

  function showError(fieldId, errId) {
    document.getElementById(fieldId).classList.add('error-input');
    document.getElementById(errId).style.display = 'block';
  }

  // ── Register ──
  function registrar() {
    clearErrors();
    const nombre  = document.getElementById('nombre').value.trim();
    const edad    = parseInt(document.getElementById('edad').value);
    const correo  = document.getElementById('correo').value.trim();
    const password = document.getElementById('password').value;

    let valid = true;

    if (!nombre) { showError('nombre','err-nombre'); valid = false; }
    if (!edad || edad < 1 || edad > 120) { showError('edad','err-edad'); valid = false; }
    if (!correo || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo)) { showError('correo','err-correo'); valid = false; }
    if (password.length < 6) { showError('password','err-password'); valid = false; }

    if (!valid) return;

    // Check duplicate email
    const users = JSON.parse(localStorage.getItem('tl_users') || '[]');
    if (users.find(u => u.correo === correo)) {
      showToast('Este correo ya está registrado', 'error');
      return;
    }

    // Save user
    users.push({ nombre, edad, correo, password });
    localStorage.setItem('tl_users', JSON.stringify(users));

    showToast(`¡Bienvenido, ${nombre}! Registro exitoso 🚀`, 'success');

    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
  }

  // Enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') registrar(); });
</script>
</body>
</html>
